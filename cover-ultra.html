<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BudgetWise â€“ Ultra Premium Cover</title>
  <link rel="stylesheet" href="./cover-ultra.css" />
</head>
<body>
  <!--
    COVER TEMPLATE (A4 portrait aspect). Designed to be:
    - rendered in browser (preview)
    - captured via html2canvas -> jsPDF
    - or mirrored with direct jsPDF drawing
  -->
  <section class="bw-cover" data-lang="en">
    <img class="bw-cover__watermark" src="./assets/brand/ff_watermark_white.png" alt="" />
    <header class="bw-cover__header">
      <img class="bw-cover__logo" src="./assets/brand/budgetwise_lockup_dark.png" alt="BudgetWise" />
      <div class="bw-cover__subtitle">Decision Intelligence Platform</div>
    </header>

    <main class="bw-cover__main">
      <h1 class="bw-cover__title"
          data-i18n-it="Rapporto Decisionale"
          data-i18n-en="Decision Report"
          data-i18n-es="Informe de DecisiÃ³n"
          data-i18n-fr="Rapport DÃ©cisionnel">Decision Report</h1>

      <div class="bw-cover__meta">
        <div class="bw-cover__period"
             data-i18n-it="Periodo"
             data-i18n-en="Period"
             data-i18n-es="PerÃ­odo"
             data-i18n-fr="PÃ©riode">Period</div>
        <div class="bw-cover__periodValue" id="bwCoverPeriodValue">â€”</div>
      </div>
    </main>

    <footer class="bw-cover__footer">
      <div class="bw-cover__footerText"
           data-i18n-it="Generato da WiseScoreâ„¢"
           data-i18n-en="Generated by WiseScoreâ„¢"
           data-i18n-es="Generado por WiseScoreâ„¢"
           data-i18n-fr="GÃ©nÃ©rÃ© par WiseScoreâ„¢">Generated by WiseScoreâ„¢</div>
    </footer>
  </section>

  <script>
    // Minimal i18n helper for preview/testing
    (function () {
      const cover = document.querySelector('.bw-cover');
      const lang = (new URLSearchParams(location.search).get('lang') || cover.dataset.lang || 'en').toLowerCase();
      cover.dataset.lang = lang;

      // Example: set period value from querystring (?period=2026-01-01%20%E2%86%92%202026-03-01)
      const period = new URLSearchParams(location.search).get('period');
      if (period) document.getElementById('bwCoverPeriodValue').textContent = period;

      // Apply i18n to elements with data-i18n-xx
      const nodes = cover.querySelectorAll('[data-i18n-' + lang + ']');
      nodes.forEach(n => n.textContent = n.getAttribute('data-i18n-' + lang));

      // Title
      const title = cover.querySelector('.bw-cover__title');
      const t = title.getAttribute('data-i18n-' + lang);
      if (t) title.textContent = t;
    })();
  </script>
</body>
</html>
